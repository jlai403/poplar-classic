<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Golf Scorekeeper</title>
  <style>
    :root {
      --bg-page: #0b0b12;
      --bg-card: #14141e;
      --bg-elevated: #1a1a26;
      --bg-surface: #12121a;
      --accent: #14b8a6;
      --accent-hover: #0d9488;
      --text-primary: #e8e8ef;
      --text-secondary: #787892;

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-page); color: var(--text-primary); }
